{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ PROJECT_NAME }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Edén Loteamiento en Tomás Romero Pereira. Lotes con ubicación estratégica, financiación y contacto directo.{% endblock %}">
    <meta name="theme-color" content="#123c2f">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    {% include "base/header.html" %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "base/footer.html" %}

    <a
        class="floating-whatsapp"
        href="https://wa.me/{{ WHATSAPP_NUMBER }}?text=Hola,%20quiero%20más%20información%20sobre%20{{ PROJECT_NAME|urlencode }}"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Contactar por WhatsApp"
    >
        WhatsApp
    </a>
</body>
</html>
